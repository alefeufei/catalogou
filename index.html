<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Premium - Camisetas</title>
    
    <!-- Open Graph / SEO -->
    <meta name="description" content="Confira nossa coleção exclusiva de camisetas minimalistas com qualidade premium. Peça agora via WhatsApp!">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://catalogou.vercel.app">
    <meta property="og:title" content="Catalogou - Camisetas Premium">
    <meta property="og:description" content="Coleção exclusiva de camisetas minimalistas. Qualidade premium para o seu dia a dia.">
    <meta property="og:image" content="https://catalogou.vercel.app/assets/banner.png">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Catalogou - Camisetas Premium">
    <meta name="twitter:description" content="Coleção exclusiva de camisetas minimalistas. Qualidade premium para o seu dia a dia.">
    <meta name="twitter:image" content="https://catalogou.vercel.app/assets/banner.png">
    
    <!-- WhatsApp specific (sometimes helps with different versions) -->
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">catalogou</div>
            <h1>Nossa Coleção</h1>
            <p style="color: var(--text-secondary);">Camisetas minimalistas com qualidade premium</p>
        </header>

        <main class="catalog-grid" id="catalogGrid">
            <!-- Os modelos serão carregados dinamicamente via main.js -->
            <div class="loading-state" style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-secondary);">
                Carregando modelos...
            </div>
        </main>

        <div id="pagination" class="pagination-container"></div>
    </div>

    <!-- Modal de Zoom -->
    <div id="imageModal" class="modal">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="imgFull">
    </div>

    <script src="main.js"></script>
</body>
</html>
